<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma DS — тестовая дизайн-система</title>
    <!-- Шрифты ДС. Instrument Serif (Antiqa) — точный, свободный. Inter — свободный заменитель
         Akkurat LL Cyr TT (Grotesk, коммерческий). Pixform не свободен → фолбэк. См. DECISIONS D22. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Анти-FOUC: применяем тему до рендера
      (function () {
        try {
          var t = localStorage.getItem('ds-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
